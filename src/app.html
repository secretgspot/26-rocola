<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Rocola - Social Jukebox</title>
	<meta name="description" content="Collaborative music queue system. Join the room and control the music." />
	<meta name="theme-color" content="#000000" />
	
	<!-- Open Graph -->
	<meta property="og:type" content="website" />
	<meta property="og:title" content="Rocola - Social Jukebox" />
	<meta property="og:description" content="Collaborative music queue system." />

	<script src="https://js.stripe.com/v3/"></script>

	%sveltekit.head%
	<style>
		:root {
			/* HUD MONOCHROME */
			--bg-dark: #000000;
			--bg-panel: #050505;
			--bg-alt: #0c0c0c;
			--border-dim: #1d1d1d;
			--border-main: #4d4d4d;
			--border-bright: #ffffff;

			--text-main: #f5f5f5;
			--text-dim: #b5b5b5;
			--text-muted: #6b6b6b;

			--hud-line: rgba(255, 255, 255, 0.08);
			--hud-glow: rgba(255, 255, 255, 0.2);
			--hud-grid: rgba(255, 255, 255, 0.04);
			--hud-tick: rgba(255, 255, 255, 0.12);

			/* TIER COLORS */
			--tier-platinum: #e6e8f2;
			--tier-gold: #f5c542;
			--tier-silver: #c0c6d4;
		}

		[data-theme="light"] {
			--bg-dark: #f5f5f5;
			--bg-panel: #ffffff;
			--bg-alt: #eeeeee;
			--border-dim: #dddddd;
			--border-main: #bbbbbb;
			--border-bright: #000000;
			--text-main: #111111;
			--text-dim: #444444;
			--text-muted: #777777;
			--hud-line: rgba(0, 0, 0, 0.08);
			--hud-glow: rgba(0, 0, 0, 0.15);
			--hud-grid: rgba(0, 0, 0, 0.04);
			--hud-tick: rgba(0, 0, 0, 0.12);
			--tier-platinum: #9aa3b2;
			--tier-gold: #b89000;
			--tier-silver: #7a8190;
		}

		/* FORCED GLOBAL RESET */
		html {
			background-color: var(--bg-dark);
			color: var(--text-main);
			height: 100%;
			width: 100%;
			overflow: hidden;
			font-family: var(--font-monospace-code);
		}

		body {
			margin: 0;
			padding: 0;
			height: 100%;
			width: 100%;
			overflow: hidden;
			-webkit-font-smoothing: none;
			box-sizing: border-box;
			background-image:
				linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0) 50%);
			background-size: 100% 100%;
		}

		/* Apply to all elements */
		*,
		*::before,
		*::after {
			box-sizing: inherit;
			border-radius: 0 !important;
			box-shadow: none !important;
			text-transform: inherit;
		}

		h1,
		h2,
		h3,
		h4,
		h5,
		h6 {
			font-weight: var(--font-weight-9);
			margin: 0;
		}

		/* Flat UI Components */
		button {
			cursor: pointer;
			border: var(--border-size-1) solid var(--border-main);
			background: var(--bg-dark);
			color: var(--text-main);
			padding: var(--size-2) var(--size-3);
			font-size: var(--font-size-0);
			font-weight: var(--font-weight-7);

			&:hover {
				border-color: var(--border-bright);
			}

			&:disabled {
				opacity: 0.3;
				cursor: not-allowed;
			}
		}


		input {
			background: var(--bg-dark);
			border: var(--border-size-1) solid var(--border-main);
			color: var(--text-main);
			padding: var(--size-2);
			font-size: var(--font-size-1);
			width: 100%;

			&:focus {
				outline: none;
				border-color: var(--border-bright);
			}
		}


		/* Scrollbar (Industrial) */
		::-webkit-scrollbar {
			width: var(--size-1);
			height: var(--size-1);
		}

		::-webkit-scrollbar-track {
			background: var(--bg-dark);
		}

		::-webkit-scrollbar-thumb {
			background: var(--border-main);
		}

		::-webkit-scrollbar-thumb:hover {
			background: var(--text-main);
		}

		/* Layout Helpers */
		.overflow-hidden {
			overflow: hidden;
		}

		.min-w-0 {
			min-width: 0;
		}

		.flex-1 {
			flex: 1;
		}

		.border-b {
			border-bottom: var(--border-size-1) solid var(--border-main);
		}

		.border-t {
			border-top: var(--border-size-1) solid var(--border-main);
		}

		.border-r {
			border-right: var(--border-size-1) solid var(--border-main);
		}

		.border-l {
			border-left: var(--border-size-1) solid var(--border-main);
		}
	</style>
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
